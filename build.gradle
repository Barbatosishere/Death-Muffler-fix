plugins {
    id 'java'
    id 'net.neoforged.gradle.userdev' version '7.1.38'
    id 'maven-publish'
}

base {
    archivesName = "death_muffler_fix"
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

repositories {
    maven {
        name = "BMCLAPI NeoForge"
        url = "https://bmclapi2.bangbang93.com/maven/neoforged/"
    }
    mavenCentral()
    maven {
        url "https://maven.aliyun.com/repository/public"
    }
    maven {
        name = "NeoForge"
        url = "https://maven.neoforged.net/releases/"
    }
    maven {
        url "https://cursemaven.com"
        content {
            includeGroup "curse.maven"
        }
    }
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    implementation "net.neoforged:neoforge:${neo_version}"
    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'
    compileOnly 'mob_grinding_utils:mob_grinding_utils:1.1.10'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.named('jar', Jar) {
    manifest {
        attributes([
                "Automatic-Module-Name": "death_muffler_fix",
                "MixinConfigs": "death_muffler_fix.mixins.json"
        ])
    }
}